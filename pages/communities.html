<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Communities — ConnectImpact</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    .page-hero { padding: 4rem 2rem 3rem; background: var(--bg-2); border-bottom: 1px solid var(--border); text-align: center; }
    .search-bar { display: flex; gap: 0.75rem; max-width: 640px; margin: 2rem auto 0; }
    .search-bar input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 18px; font-size: 0.95rem; color: var(--text); outline: none; font-family: var(--font); transition: var(--transition); }
    .search-bar input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .search-bar input::placeholder { color: var(--text-3); }
    .filters-bar { display: flex; gap: 0.6rem; flex-wrap: wrap; padding: 1.5rem 2rem; max-width: 1280px; margin: 0 auto; }
    .filter-btn { padding: 7px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; font-size: 0.82rem; color: var(--text-2); cursor: pointer; transition: var(--transition); font-family: var(--font); }
    .filter-btn:hover, .filter-btn.active { background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.4); color: var(--blue-light); }
    .communities-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; padding: 0 2rem 4rem; max-width: 1280px; margin: 0 auto; }
    .community-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: var(--transition); cursor: pointer; }
    .community-card:hover { border-color: var(--border-2); transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.3); }
    .community-banner { height: 100px; display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative; }
    .community-verified { position: absolute; top: 10px; right: 10px; }
    .community-body { padding: 1.25rem; }
    .community-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.5rem; }
    .community-desc { font-size: 0.85rem; color: var(--text-2); line-height: 1.6; margin-bottom: 1rem; }
    .community-meta { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; color: var(--text-3); margin-bottom: 1rem; }
    .community-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 1.25rem; }
    .tag { padding: 3px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; font-size: 0.73rem; color: var(--text-3); }
    .member-avatars { display: flex; margin-left: auto; }
    .member-avatars .avatar { width: 24px; height: 24px; font-size: 0.65rem; border: 2px solid var(--bg-2); margin-left: -6px; }
    .member-avatars .avatar:first-child { margin-left: 0; }
    @media(max-width:640px){.communities-grid{grid-template-columns:1fr}.search-bar{flex-direction:column}}
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo"><div class="logo-orb"></div><span>ConnectImpact</span></a>
      <ul class="nav-links">
        <li><a href="communities.html" style="color:var(--text);">Communities</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="volunteer.html">Volunteer</a></li>
        <li><a href="skills.html">Skills</a></li>
        <li><a href="ai-assistant.html">AI Assistant</a></li>
      </ul>
      <div class="nav-actions">
        <a href="dashboard.html" class="btn-ghost">Dashboard</a>
        <a href="profile.html" class="btn-primary">Profile</a>
      </div>
    </div>
  </nav>

  <div style="padding-top:64px;">
    <div class="page-hero">
      <div class="section-label">Discover</div>
      <h1 style="font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;letter-spacing:-0.02em;">Find your community</h1>
      <p style="color:var(--text-2);margin-top:0.75rem;">1,800+ active groups across 340 cities. No followers, no feeds — just real people with shared passions.</p>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search communities, interests, or locations…" oninput="filterCommunities()" />
        <button class="btn-primary" onclick="filterCommunities()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Search
        </button>
      </div>
    </div>

    <div class="filters-bar">
      <span style="font-size:0.82rem;color:var(--text-3);margin-right:4px;align-self:center;">Filter:</span>
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('fitness',this)">🏃 Fitness</button>
      <button class="filter-btn" onclick="setFilter('reading',this)">📚 Reading</button>
      <button class="filter-btn" onclick="setFilter('photography',this)">📷 Photography</button>
      <button class="filter-btn" onclick="setFilter('music',this)">🎵 Music</button>
      <button class="filter-btn" onclick="setFilter('cycling',this)">🚴 Cycling</button>
      <button class="filter-btn" onclick="setFilter('tech',this)">🤖 Tech</button>
      <button class="filter-btn" onclick="setFilter('yoga',this)">🧘 Yoga</button>
      <button class="filter-btn" onclick="setFilter('art',this)">🎨 Art</button>
      <button class="filter-btn" onclick="setFilter('hiking',this)">🥾 Hiking</button>
      <button class="filter-btn" onclick="setFilter('gaming',this)">🎮 Gaming</button>
    </div>

    <div class="communities-grid" id="communities-grid"></div>
  </div>

  <script>
    window.addEventListener('scroll',()=>{document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>20)});

    const communities = [
      { id:1, emoji:'📷', color:'#1e3a5f', name:'Delhi Photography Collective', desc:'Weekend photo walks, exhibitions, and gear sharing for photographers at all levels.', members:342, distance:'2.4 km', tags:['photography','art','outdoors'], category:'photography', verified:true },
      { id:2, emoji:'🧘', color:'#1e2d1e', name:'Morning Yoga Flow', desc:'Daily 7am sessions in Lodhi Garden. All levels welcome. Build mindfulness and community together.', members:187, distance:'1.1 km', tags:['yoga','wellness','morning'], category:'yoga', verified:true },
      { id:3, emoji:'🤖', color:'#1a1e3a', name:'AI & Builders Network', desc:'Weekly meetups for AI enthusiasts, developers, and entrepreneurs building the future.', members:521, distance:'3.8 km', tags:['tech','ai','startup'], category:'tech', verified:true },
      { id:4, emoji:'🚴', color:'#1e2a1e', name:'Sunday Cycling Squad', desc:'Casual weekend rides from 15–50km. Supportive group for beginners and seasoned riders alike.', members:278, distance:'0.8 km', tags:['cycling','fitness','outdoors'], category:'cycling', verified:true },
      { id:5, emoji:'📚', color:'#2d1e1e', name:'Sci-Fi Book Club', desc:'Monthly deep dives into science fiction classics and new releases. Great discussions guaranteed.', members:94, distance:'4.2 km', tags:['reading','books','scifi'], category:'reading', verified:false },
      { id:6, emoji:'🎵', color:'#2d1a2d', name:'Jazz & Blues Collective', desc:'Live sessions, jam nights, and vinyl listening parties for music lovers in the city.', members:156, distance:'2.9 km', tags:['music','jazz','events'], category:'music', verified:true },
      { id:7, emoji:'🥾', color:'#1e2a1a', name:'Weekend Hikers Club', desc:'Monthly treks to Aravalli hills and beyond. All fitness levels welcome. Safety first!', members:412, distance:'1.5 km', tags:['hiking','outdoors','fitness'], category:'hiking', verified:true },
      { id:8, emoji:'🎨', color:'#2a1e2d', name:'Sketch & Paint Collective', desc:'Open studio sessions every Saturday. Watercolors, oils, digital — all mediums welcome.', members:133, distance:'3.1 km', tags:['art','painting','creative'], category:'art', verified:false },
      { id:9, emoji:'🎮', color:'#1a1e2d', name:'Board Game Nights', desc:'Weekly tabletop gaming sessions. From Catan to Dungeons & Dragons — all games welcome.', members:89, distance:'1.7 km', tags:['gaming','social','indoors'], category:'gaming', verified:true },
      { id:10, emoji:'🏃', color:'#1e2a1e', name:'5K Running Crew', desc:'Beginner-friendly running group. Meet Tuesdays and Thursdays at 6am. No one left behind!', members:203, distance:'0.5 km', tags:['running','fitness','morning'], category:'fitness', verified:true },
      { id:11, emoji:'🌐', color:'#1e1e2d', name:'Language Exchange Network', desc:'Practice Hindi, English, French, or Mandarin with native speakers. Weekly conversation tables.', members:367, distance:'2.2 km', tags:['language','culture','social'], category:'language', verified:true },
      { id:12, emoji:'🚀', color:'#1e1a2d', name:'Startup Founders Circle', desc:'Peer support, mentorship, and accountability for early-stage entrepreneurs. Monthly pitch nights.', members:298, distance:'3.4 km', tags:['startup','business','networking'], category:'tech', verified:true },
    ];

    let activeFilter = 'all';
    let searchTerm = '';

    function renderCommunities() {
      const grid = document.getElementById('communities-grid');
      const filtered = communities.filter(c => {
        const matchFilter = activeFilter === 'all' || c.category === activeFilter;
        const matchSearch = !searchTerm || c.name.toLowerCase().includes(searchTerm) || c.desc.toLowerCase().includes(searchTerm) || c.tags.some(t => t.includes(searchTerm));
        return matchFilter && matchSearch;
      });

      grid.innerHTML = filtered.length ? filtered.map((c,i) => `
        <div class="community-card reveal" style="animation-delay:${i*50}ms" onclick="joinCommunity('${c.name}')">
          <div class="community-banner" style="background:${c.color};">
            <span>${c.emoji}</span>
            ${c.verified ? '<span class="community-verified"><span class="badge badge-blue">✓ Verified</span></span>' : ''}
          </div>
          <div class="community-body">
            <div class="community-name">${c.name}</div>
            <div class="community-desc">${c.desc}</div>
            <div class="community-meta">
              <span>👥 ${c.members.toLocaleString()} members</span>
              <span>📍 ${c.distance} away</span>
            </div>
            <div class="community-tags">${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
            <button class="btn-primary w-full" style="justify-content:center;">Join Community</button>
          </div>
        </div>
      `).join('') : `<div style="grid-column:1/-1;text-align:center;padding:4rem;color:var(--text-3);">
        <div style="font-size:3rem;margin-bottom:1rem;">🔍</div>
        <p>No communities found. Try a different search or <a href="ai-assistant.html" style="color:var(--blue-light);">ask the AI</a> to suggest one!</p>
      </div>`;

      // Re-attach reveal
      const rv = new IntersectionObserver(e=>e.forEach(en=>{if(en.isIntersecting)en.target.classList.add('visible');}),{threshold:0.05});
      grid.querySelectorAll('.reveal').forEach(el=>rv.observe(el));
    }

    function setFilter(f, btn) {
      activeFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderCommunities();
    }

    function filterCommunities() {
      searchTerm = document.getElementById('search-input').value.toLowerCase();
      renderCommunities();
    }

    function joinCommunity(name) {
      const toast = document.createElement('div');
      toast.className='toast success';
      toast.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>Joined <strong>'+name+'</strong>! 🎉</span>';
      let c=document.querySelector('.toast-container');
      if(!c){c=document.createElement('div');c.className='toast-container';document.body.appendChild(c);}
      c.appendChild(toast);
      setTimeout(()=>{toast.style.opacity='0';toast.style.transform='translateX(100%)';toast.style.transition='0.3s';setTimeout(()=>toast.remove(),300);},3000);
    }

    renderCommunities();
  </script>
</body>
</html>
